log:
  level: INFO

# ============================================================
# 去重状态：数据库会由 GitHub Actions 自动保存到 main 分支
# ============================================================
storage:
  enabled: true
  db_path: database/papers.db
  content_storage_enabled: false
  keep_arxiv_version: false

# ============================================================
# 检索策略
# ============================================================
search:
  # 第一周建议先用 pubmed + arxiv。
  # 如果结果质量可以，再把 openalex 加进去。
  sources: [pubmed, arxiv]

  # 每个主题最多保留多少篇“新论文”
  max_results: 5

  # 每天运行一次，但检索最近 3 天。
  # 由于 SQLite 会去重，因此不会每天重复推送；
  # 这样可以避免接口延迟、GitHub Actions 偶发延迟造成漏文献。
  pull_every: 3

  # 不用更早论文硬凑数量
  fill_enabled: false
  max_lookback_days: 30

  max_fetch_items: 150
  fetch_batch_size: 25



# ============================================================
# 论文主题
# ============================================================
queries:

  - NAME: 抗菌肽与宿主防御肽
    OR:
      - antimicrobial peptide
      - antimicrobial peptides
      - host defense peptide
      - peptide antibiotic
      - bacteriocin
      - antimicrobial peptidomics
    NOT:
      - review
      - systematic review
      - meta-analysis
      - protocol
      - editorial

  - NAME: 微生物组与宏基因组
    OR:
      - microbiome
      - microbiota
      - metagenome
      - metagenomic
      - microbial community
      - host-microbiome interaction
      - insect microbiome
    NOT:
      - review
      - systematic review
      - protocol
      - editorial

  - NAME: 蛋白语言模型与酶工程
    OR:
      - protein language model
      - protein foundation model
      - protein design
      - enzyme engineering
      - enzyme design
      - directed evolution
      - metagenomic enzyme
      - protein sequence model
    NOT:
      - review
      - benchmark
      - survey

  - NAME: 生物信息学与计算生物学方法
    OR:
      - bioinformatics
      - computational biology
      - metagenomic binning
      - genome assembly
      - microbial genomics
      - single-cell genomics
      - sequence representation learning
    NOT:
      - review
      - protocol
      - editorial

  - NAME: 顶刊与核心生信期刊
    JOURNAL:
      OR:
        - Nature
        - Science
        - Cell
        - Nature Biotechnology
        - Nature Methods
        - Nature Microbiology
        - Nature Communications
        - Genome Biology
        - Bioinformatics
        - Nucleic Acids Research
        - Microbiome
        - The ISME Journal
        - PLOS Computational Biology
    OR:
      - microbiome
      - metagenome
      - antimicrobial peptide
      - protein design
      - protein language model
      - bioinformatics
      - computational biology

# ============================================================
# 输出
# ============================================================
output:
  base_dir: output
  formats: [html]

# ============================================================
# LLM 总结
# ============================================================
llm:
  enabled: true
  provider: openai-compat

  base_url: https://api.deepseek.com
  model: deepseek-v4-pro
  api_key_env: LLM_API_KEY

  timeout: 60
  target_lang: Simplified Chinese
  temperature: 0.2
  max_tokens: 900
  max_workers: 2

  enable_translation: true
  enable_summary: true

  max_retries: 3
  retry_base_delay: 1.0
  retry_max_delay: 10.0
  retry_timeout_multiplier: 1.0
