log:
  level: INFO

queries:
  - NAME: pubmed-glp1-obesity
    AND:
      - GLP-1 receptor agonist
      - obesity

search:
  sources: [pubmed]
  max_results: 5
  pull_every: 30
  fill_enabled: true
  max_lookback_days: 180

output:
  base_dir: output
  formats: [console, markdown, html]

llm:
  enabled: false
